theme = "monoglow_z"

[editor]
line-number = "relative"
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
soft-wrap.enable = true
auto-format = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = false
highlight-active-indent = true
show-trailing-space = false

[editor.lsp]
enable = true
display-messages = true
display-progress-messages = true
display-inlay-hints = true

[keys.normal]
C-s = ":w"
C-q = ":q"

[keys.insert]
j = { j = "normal_mode", k = "normal_mode" }

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-base-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position-percentage", "position", "file-encoding", "file-line-ending", "file-type"]
separator = " "
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

